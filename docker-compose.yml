version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sector_guard_web
    ports:
      - "5555:5555"
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:sectorguard2026@db:5432/sector_guard_db?schema=public
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npx prisma generate && npm run dev"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sector_network

  db:
    image: postgres:15-alpine
    container_name: sector_guard_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sectorguard2026
      - POSTGRES_DB=sector_guard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sector_network

volumes:
  pgdata:

networks:
  sector_network:
    driver: bridge
